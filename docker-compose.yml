services:
  postgres:
    image: postgres:16-alpine
    container_name: scentiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scentiq_dev
      POSTGRES_USER: scentiq
      POSTGRES_PASSWORD: scentiq_local_password
    ports:
      - "5432:5432"
    volumes:
      - scentiq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scentiq -d scentiq_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  scentiq_postgres_data:
